<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GitChop __VERSION__ release notes</title>
<style>
:root {
    color-scheme: light dark;
    --fg:      #0e1116;
    --fg-dim:  #55606d;
    --bg:      #ffffff;
    --accent:  #1a3dd6;
    --rule:    rgba(0,0,0,0.08);
    --chip-bg: rgba(26,61,214,0.10);
}
@media (prefers-color-scheme: dark) {
    :root {
        --fg:      #e9ecf1;
        --fg-dim:  #9aa3b2;
        --bg:      #070f33;
        --accent:  #8fb4ff;
        --rule:    rgba(255,255,255,0.10);
        --chip-bg: rgba(143,180,255,0.18);
    }
}
* { box-sizing: border-box; }
html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 13px/1.55 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
}
.wrap { padding: 18px 22px 24px; }
.version {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); background: var(--chip-bg);
    padding: 2px 8px; border-radius: 999px; margin-bottom: 12px;
}
.meta { color: var(--fg-dim); font-size: 12px; margin: 0 0 16px; }
h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
h2 {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-dim); margin: 20px 0 8px;
}
h2:first-of-type { margin-top: 0; }
p { margin: 0 0 10px; }
ul { margin: 0; padding: 0 0 0 18px; }
li { margin: 0 0 6px; }
li::marker { color: var(--accent); }
li strong { font-weight: 600; color: var(--fg); }
code {
    font: 11.5px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--chip-bg); color: var(--accent);
    padding: 1px 5px; border-radius: 4px;
}
kbd {
    font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--chip-bg); color: var(--accent);
    border: 1px solid var(--rule);
    padding: 1px 5px; border-radius: 4px;
}
hr { border: none; border-top: 1px solid var(--rule); margin: 18px 0; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
    <div class="version">GitChop __VERSION__</div>
    <p class="meta">Released __DATE__</p>
__CONTENT__
</div>
</body>
</html>
